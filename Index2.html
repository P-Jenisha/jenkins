<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant Website</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    margin: 0;

    /* 🌈 Attractive Gradient Background */
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
}

/* Sections */
.section {
    display: none;
    padding: 40px;
}

.active {
    display: block;
}

/* Glass Style Box */
.box {
    background: rgba(255, 255, 255, 0.2);
    padding: 25px;
    width: 320px;
    margin: auto;
    border-radius: 15px;

    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Headings */
h1, h2 {
    margin-bottom: 15px;
}

/* Inputs */
input {
    padding: 8px;
    margin: 8px;
    width: 80%;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* Buttons */
button {
    padding: 10px 18px;
    margin-top: 10px;
    border: none;
    border-radius: 20px;
    background: #ff7a18;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff3d00;
    transform: scale(1.05);
}

/* Menu Items */
.item {
    background: rgba(255,255,255,0.25);
    margin: 10px auto;
    padding: 12px;
    width: 280px;
    border-radius: 12px;
}

/* Menu View Text */
#menu p {
    background: rgba(255,255,255,0.25);
    margin: 8px auto;
    padding: 10px;
    width: 250px;
    border-radius: 10px;
}

/* Summary Box */
#result {
    white-space: pre-line;
    background: rgba(0,0,0,0.3);
    padding: 15px;
    border-radius: 10px;
    width: 300px;
    margin: auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="section active">
    <div class="box">
        <h2>🍽️ My Hotel</h2>
        <h3>Login</h3>

        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>

        <button onclick="login()">Login</button>
        <p id="error" style="color:red;"></p>

        <p style="color:green;">Demo: admin / 1234</p>
    </div>
</div>

<!-- WELCOME -->
<div id="welcome" class="section">
    <h1>Welcome to Our Restaurant 🍽️</h1>
    <button onclick="showMenu()">View Menu</button>
</div>

<!-- MENU VIEW -->
<div id="menu" class="section">
    <h1>Menu List 🍴</h1>

    <p>Veg Burger - ₹100</p>
    <p>Pizza - ₹200</p>
    <p>Biryani - ₹220</p>
    <p>Ice Cream - ₹80</p>

    <button onclick="goToOrder()">Order Now</button>
</div>

<!-- ORDER PAGE -->
<div id="order" class="section">
    <h1>Order Food 🛒</h1>

    <div class="item">Veg Burger ₹100
        <input type="number" id="veg" value="0" min="0">
    </div>

    <div class="item">Pizza ₹200
        <input type="number" id="pizza" value="0" min="0">
    </div>

    <div class="item">Biryani ₹220
        <input type="number" id="biryani" value="0" min="0">
    </div>

    <div class="item">Ice Cream ₹80
        <input type="number" id="ice" value="0" min="0">
    </div>

    <button onclick="showSummary()">Place Order</button>
</div>

<!-- SUMMARY -->
<div id="summary" class="section">
    <h1>Order Summary 🧾</h1>

    <h3 id="result"></h3>

    <button onclick="logout()">Logout</button>
</div>

<script>

/* LOGIN */
function login() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (u === "admin" && p === "1234") {
        changePage("login", "welcome");
    } else {
        document.getElementById("error").innerText = "Invalid Login";
    }
}

/* PAGE CHANGE FUNCTION */
function changePage(from, to) {
    document.getElementById(from).classList.remove("active");
    document.getElementById(to).classList.add("active");
}

/* FLOW FUNCTIONS */
function showMenu() {
    changePage("welcome", "menu");
}

function goToOrder() {
    changePage("menu", "order");
}

function showSummary() {
    let total = 0;
    let text = "🧾 Your Order:\n";

    let veg = document.getElementById("veg").value;
    let pizza = document.getElementById("pizza").value;
    let biryani = document.getElementById("biryani").value;
    let ice = document.getElementById("ice").value;

    if (veg > 0) {
        total += veg * 100;
        text += `Veg Burger x ${veg} = ₹${veg*100}\n`;
    }
    if (pizza > 0) {
        total += pizza * 200;
        text += `Pizza x ${pizza} = ₹${pizza*200}\n`;
    }
    if (biryani > 0) {
        total += biryani * 220;
        text += `Biryani x ${biryani*220}\n`;
    }
    if (ice > 0) {
        total += ice * 80;
        text += `Ice Cream x ${ice*80}\n`;
    }

    if (total === 0) {
        text = "Please select items!";
    } else {
        text += "\nTotal = ₹" + total;
    }

    document.getElementById("result").innerText = text;

    changePage("order", "summary");
}

/* LOGOUT */
function logout() {
    location.reload();
}

</script>

</body>
</html>
