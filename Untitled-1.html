<!DOCTYPE html>
<html>
<head>
<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#4facfe;
    color:#fff;
}
.s{display:none}.a{display:block}
.box,.item{background:#ffffff33;margin:10px auto;padding:10px;
border-radius:10px;width:260px}
input,button{margin:5px;padding:6px;border:none;border-radius:6px}
button{background:#ff7a18;color:#fff}
</style>
</head>

<body>

<div id="l" class="s a">
<div class="box">
<h3>Login</h3>
<input id="u" placeholder="Username"><br>
<input id="p" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="e" style="color:red"></p>
<p style="color:black">Demo: admin / 1234</p>
</div>
</div>

<div id="w" class="s">
<h2>Welcome To The Restaurant🍽️</h2>
<button onclick="sh('m')">View Menu</button>
</div>

<div id="m" class="s">
<h2>Menu</h2>
<div id="ml"></div>
<button onclick="sh('o')">Order</button>
</div>

<div id="o" class="s">
<h2>Order</h2>
<div id="ol"></div>
<button onclick="bill()">Done</button>
</div>

<div id="s" class="s">
<h2>Summary</h2>
<pre id="out"></pre>
<button onclick="location.reload()">Logout</button>
</div>

<script>
let d=document,items=[["Burger",100],["Pizza",200],["Biryani",220],["IceCream",80]];

ml.innerHTML=items.map(i=>`<p>${i[0]} ₹${i[1]}</p>`).join('');
ol.innerHTML=items.map((i,x)=>`<div class=item>${i[0]} ₹${i[1]}
<input type=number id=q${x} value=0 min=0></div>`).join('');

function sh(x){
d.querySelectorAll('.s').forEach(v=>v.classList.remove('a'));
d.getElementById(x).classList.add('a');
}

function login(){
if(u.value==="admin" && p.value==="1234") sh('w');
else e.innerText="Invalid Login";
}

function bill(){
let t=0,txt="🧾\n";
items.forEach((i,x)=>{
let q=d.getElementById('q'+x).value;
if(q>0){t+=q*i[1];txt+=`${i[0]} x${q}=₹${q*i[1]}\n`}
});
out.innerText=t?txt+"\nTotal ₹"+t:"Select items!";
sh('s');
}
</script>

</body>
</html>
