<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Restaurant Website</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    text-align: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
}

/* Sections */
.section { display: none; padding: 30px; }
.active { display: block; }

/* Box */
.box {
    background: rgba(255,255,255,0.2);
    padding: 20px;
    width: 320px;
    margin: auto;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* Items */
.item {
    background: rgba(255,255,255,0.2);
    margin: 10px auto;
    padding: 10px;
    width: 300px;
    border-radius: 10px;
}

.item img {
    width: 60px;
    height: 60px;
    border-radius: 8px;
}

/* Buttons */
button {
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: orange;
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

/* Mobile Responsive */
@media (max-width: 500px) {
    .box, .item { width: 90%; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="section active">
<div class="box">
<h2>🍽️ My Hotel</h2>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="error"></p>
<p>Demo: admin / 1234</p>
</div>
</div>

<!-- WELCOME -->
<div id="welcome" class="section">
<h1>Welcome 🍽️</h1>
<button onclick="showMenu()">View Menu</button>
</div>

<!-- MENU -->
<div id="menu" class="section">
<h1>Menu 🍴</h1>

<div class="item">
<img src=<img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=200">>
Veg Burger ₹100
<button onclick="addToCart('Veg Burger',100)">Add</button>
</div>

<div class="item">
<img src=<img src="https://images.unsplash.com/photo-1548365328-9f547fb0953d?w=200">
Pizza ₹200
<button onclick="addToCart('Pizza',200)">Add</button>
</div>

<div class="item">
<img src="https://via.placeholder.com/60">
Biryani ₹220
<button onclick="addToCart('Biryani',220)">Add</button>
</div>

<div class="item">
<img src="https://via.placeholder.com/60">
Ice Cream ₹80
<button onclick="addToCart('Ice Cream',80)">Add</button>
</div>

<button onclick="goToCart()">Go to Cart</button>
</div>

<!-- CART -->
<div id="cartPage" class="section">
<h1>🛒 Your Cart</h1>
<div id="cartItems"></div>
<button onclick="goToPayment()">Proceed to Payment</button>
</div>

<!-- PAYMENT -->
<div id="payment" class="section">
<h1>💳 Payment</h1>
<p>Total: ₹<span id="totalAmount"></span></p>

<select id="method">
<option>UPI</option>
<option>Card</option>
<option>Cash</option>
</select>

<br>
<button onclick="placeOrder()">Pay Now</button>
</div>

<!-- SUMMARY -->
<div id="summary" class="section">
<h1>🧾 Order Summary</h1>
<h3 id="result"></h3>
<button onclick="logout()">Logout</button>
</div>

<script>

let cart = [];

/* LOGIN */
function login() {
    let u = username.value;
    let p = password.value;
    if (u==="admin" && p==="1234") {
        change("login","welcome");
    } else error.innerText="Invalid";
}

/* PAGE CHANGE */
function change(a,b){
    document.getElementById(a).classList.remove("active");
    document.getElementById(b).classList.add("active");
}

function showMenu(){ change("welcome","menu"); }

/* CART */
function addToCart(name,price){
    cart.push({name,price});
    alert(name+" added!");
}

function goToCart(){
    change("menu","cartPage");
    displayCart();
}

function displayCart(){
    let text="";
    let total=0;

    cart.forEach((item,i)=>{
        total+=item.price;
        text += `${item.name} ₹${item.price} 
        <button onclick="removeItem(${i})">❌</button><br>`;
    });

    cartItems.innerHTML=text;
    totalAmount.innerText=total;
}

function removeItem(i){
    cart.splice(i,1);
    displayCart();
}

/* PAYMENT */
function goToPayment(){
    change("cartPage","payment");
}

function placeOrder(){
    let total = totalAmount.innerText;
    let method = document.getElementById("method").value;

    result.innerText = `Paid ₹${total} via ${method}\nOrder Successful!`;
    change("payment","summary");
}

/* LOGOUT */
function logout(){
    location.reload();
}

</script>

</body>
</html>
